name: darwin CI

# Build + test the macOS app (darwin/) on every PR and every push to main that
# touches it. Path-scoped so Windows-only changes don't spin up a Mac runner.
on:
  push:
    branches: [main]
    paths:
      - "darwin/**"
      - ".github/workflows/darwin-ci.yml"
  pull_request:
    paths:
      - "darwin/**"
      - ".github/workflows/darwin-ci.yml"

concurrency:
  group: darwin-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: darwin

jobs:
  test:
    name: Build & Test
    runs-on: macos-26 # matches local Xcode 26.x; switch to macos-15 for wider compat
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain versions
        run: swift --version && xcodebuild -version

      - name: Install xcbeautify
        run: brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify

      - name: Run tests
        run: bin/test

  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew list swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: SwiftLint
        run: bin/lint
