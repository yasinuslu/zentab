# ZenTab config. The switching *behavior* is fixed (it is the opinion ZenTab
# ships); only the trigger keys and the tap-vs-hold threshold are configurable.
#
# Every value has a strong compiled-in default, so this file ships with everything
# COMMENTED OUT — the defaults win. The defaults depend on the launch profile:
#   • production (the shipped app, `bin/run-prod`): Cmd+`, Cmd+Tab, Option+Tab
#     — ZenTab replaces the native macOS switchers and keeps that claim reliable.
#   • development (`bin/run`): Ctrl+Opt+`, Ctrl+Opt+Tab, Ctrl+Opt+A — safe chords
#     that never touch your real Cmd+Tab while you iterate.
#
# To override, copy this file to ~/.config/zentab/config.toml and uncomment a line.
# NOTE: an uncommented key here pins that key for ALL profiles (it overrides the
# profile default), which is why the shipped copy leaves them commented.
#
# Modifiers: cmd, opt (alt), ctrl, shift. Shift is reserved as the universal
# "reverse" key and is never part of a trigger.

# [keys]
# current_app = "cmd+`"      # windows of the current app
# other_apps  = "cmd+tab"    # other apps' windows (replaces the native switcher)
# everything  = "opt+tab"    # everything, everywhere

# [behavior]
# The overlay appears only after the trigger modifier is held this long (ms). A
# faster tap switches instantly with no overlay (the fast path is sacred).
# hold_threshold_ms = 150
