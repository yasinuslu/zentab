name: website Pages

# Build the marketing site (website/) and deploy it to GitHub Pages. Path-scoped
# so app-only changes don't redeploy the site. Runs on pushes to main and can be
# triggered by hand. Pages source must be set to "GitHub Actions" in repo settings.
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:

# Least privilege + the OIDC token the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: website

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # GitHub Pages serves this project at https://<owner>.github.io/zentab/
          BASE_PATH: /zentab/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
