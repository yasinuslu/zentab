# ZenTab configuration
#
# ZenTab is intentionally opinionated and almost nothing is configurable (see VISION.md):
# the switching behavior is fixed. The only knobs are the three trigger chords and the
# hold threshold.
#
# This file is read first when it sits beside the exe or in the working directory (a
# portable / dev override); the standard per-user config lives at
# %APPDATA%\zentab\config.toml. With no config at all, ZenTab uses the shipping defaults:
#
#   [keys]
#   other_apps  = "alt+tab"        # everyday switch — apps on the monitor under the cursor
#   current_app = "alt+`"          # windows of the current app
#   everything  = "ctrl+alt+tab"   # the "I lost something" escape hatch
#
#   [behavior]
#   hold_threshold_ms = 150        # hold past this to reveal the overlay; a quicker tap-and-
#                                  # release switches invisibly
#
# The dev build uses the REAL gestures (Alt+Tab / Alt+` / Ctrl+Alt+Tab) so testing feels
# exactly like the shipped app — it does hijack your normal Windows Alt+Tab while running.
# `dotnet run` copies this file next to the build output; the published exe and MSI exclude it
# (CopyToPublishDirectory="Never"), so this override only affects local dev.

[keys]
other_apps  = "alt+tab"        # everyday switch — apps on the monitor under the cursor
current_app = "alt+`"          # windows of the current app
everything  = "ctrl+alt+tab"   # the "I lost something" escape hatch

# [behavior]
# hold_threshold_ms = 150
