name: windows CI

# Build the Windows app (windows/) on every PR and every push to main that
# touches it. Path-scoped so macOS-only changes don't spin up a Windows runner.
on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/windows-ci.yml"
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: windows

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      # Smoke-test the self-contained publish that actually ships (catches publish-only
      # breakage: single-file, trimming, manifest, embedded icon). No --no-restore: a
      # RID-specific publish needs its own restore (win-x64 target).
      - name: Publish smoke test
        run: dotnet publish -c Release -r win-x64
