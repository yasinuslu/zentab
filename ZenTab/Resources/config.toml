# ZenTab config. The switching *behavior* is fixed (it is the opinion ZenTab
# ships); only these trigger keys and the tap-vs-hold threshold are configurable.
# Copy this to ~/.config/zentab/config.toml to override. Every value has a strong
# default, so the file can be as short as a single line.
#
# These are SAFE, non-hijacking dev chords. The shipped design binds Cmd+`,
# Cmd+Tab, and Option+Tab, but overriding the native Cmd+Tab switcher dependably
# is a later hardening milestone; until then ZenTab stays out of the system's way.
#
# Modifiers: cmd, opt (alt), ctrl, shift. Shift is reserved as the universal
# "reverse" key and is never part of a trigger.

[keys]
current_app = "ctrl+opt+`"    # (future Cmd+`)      windows of the current app
other_apps  = "ctrl+opt+tab"  # (future Cmd+Tab)    other apps' windows
everything  = "ctrl+opt+a"    # (future Option+Tab) everything (a = all). NOT Space:
                              # Ctrl+Opt+Space is macOS "select next input source".

[behavior]
# The overlay appears only after the trigger modifier is held this long. A faster
# tap switches instantly with no overlay (the fast path is sacred).
hold_threshold_ms = 150
