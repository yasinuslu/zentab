# XcodeGen spec: the SOURCE OF TRUTH for ZenTab.xcodeproj.
#
# As ZenTab grew into a real window switcher (many source files across several
# folders), hand-editing the .pbxproj for every new file became the bottleneck.
# So project.yml is now authoritative and the committed ZenTab.xcodeproj is
# generated from it. Sources are discovered by directory (`path: ZenTab`), so
# adding a .swift file needs no project edit: just regenerate.
#
#   xcodegen generate     # or: bin/generate
#
# Change build settings, Info.plist keys, and entitlements HERE (not in Xcode),
# then regenerate and commit both this file and the regenerated project.
name: ZenTab
options:
  bundleIdPrefix: org.nepjua
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  ZenTab:
    type: application
    platform: macOS
    sources:
      - path: ZenTab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.nepjua.ZenTab
        PRODUCT_NAME: ZenTab
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ZenTab
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # Accessory (agent) app: no Dock icon, no main menu. The switcher lives
        # in the menu bar and a non-activating overlay, so it must never become
        # the active app or steal key focus from the window being switched to.
        INFOPLIST_KEY_LSUIElement: "YES"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: ZenTab/ZenTab.entitlements
        # Link the private SkyLight.framework (WindowServer / CGS + SLPS SPIs used
        # for enumeration, focus, and capture). It is an OS dylib in the dyld
        # shared cache: link it, never embed it. Expressed as flags rather than a
        # Frameworks build phase so the generated project stays trivial.
        FRAMEWORK_SEARCH_PATHS: "$(inherited) /System/Library/PrivateFrameworks"
        OTHER_LDFLAGS: "$(inherited) -framework SkyLight"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  ZenTabTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ZenTabTests
    dependencies:
      - target: ZenTab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.nepjua.ZenTabTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ZenTab:
    build:
      targets:
        ZenTab: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - ZenTabTests
